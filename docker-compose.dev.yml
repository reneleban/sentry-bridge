version: "3.9"

# Dev-only: Janus WebRTC gateway as sidecar (Mac cannot install Janus natively)
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# In production the Janus process runs inside the main container (see Dockerfile / Issue #9).

services:
  janus:
    image: canyan/janus-gateway:latest
    network_mode: host
    volumes:
      - ./config/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./config/janus/janus.plugin.streaming.jcfg:/usr/local/etc/janus/janus.plugin.streaming.jcfg:ro
      - ./config/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/janus/info"]
      interval: 5s
      timeout: 3s
      retries: 10
