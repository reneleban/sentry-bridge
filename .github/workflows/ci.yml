name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        env:
          npm_config_production: "false"
        run: npm ci && cd frontend && npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:backend

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Jest Tests
          path: reports/junit.xml
          reporter: jest-junit

  docker-build:
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=registry,ref=reneleban/obico-prusalink-bridge:buildcache
