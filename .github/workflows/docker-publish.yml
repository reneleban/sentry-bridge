name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tags=rleban/obico-prusalink-bridge:${GITHUB_REF_NAME},rleban/obico-prusalink-bridge:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=rleban/obico-prusalink-bridge:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=rleban/obico-prusalink-bridge:buildcache
          cache-to: type=registry,ref=rleban/obico-prusalink-bridge:buildcache,mode=max
