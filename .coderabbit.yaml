# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/configuration
reviews:
  auto_review:
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!frontend/dist/**"

tone_instructions: >
  Use 3D printing metaphors where they fit naturally:
  spaghetti for messy code, layer adhesion for cohesion,
  thermal runaway for unhandled errors, first layer for
  foundational assumptions. Stay concise.
